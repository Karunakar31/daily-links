name: Update IPTV playlists

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate playlists
        run: npm run generate
      - name: Detect changes
        id: changes
        run: echo "changed=$(git diff --quiet -- playlist data && echo false || echo true)" >> "$GITHUB_OUTPUT"
      - name: Commit and push updated playlists
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add playlist data
          git commit -m "chore: update IPTV playlists"
          git push
      - name: Prepare GitHub Pages artifact
        run: cp playlist/*.m3u .
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
